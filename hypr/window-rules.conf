# https://wiki.hyprland.org/Configuring/Window-Rules/

# transparency  
windowrule {  
    name = kitty-opacity  
    match:class = ^(kitty)$  
    opacity = 0.90 0.80  
}  
  
windowrule {  
    name = pcmanfm-qt-opacity  
    match:class = ^(pcmanfm-qt)$  
    opacity = 0.90 0.80  
}  
  
windowrule {  
    name = obs-studio-opacity  
    match:class = ^(com.obsproject.Studio)$  
    opacity = 0.80 0.80  
}  
  
windowrule {  
    name = qview-opacity  
    match:class = ^(com.interversehq.qView)$  
    opacity = 0.90 0.80  
}  
  
# firefox  
windowrule {  
    name = firefox-pip-float  
    match:class = ^(firefox)$  
    match:title = ^(Picture-in-Picture)$  
    float = true  
}  
  
windowrule {  
    name = firefox-library-float  
    match:class = ^(firefox)$  
    match:title = ^(Library)$  
    float = true  
}  
  
windowrule {  
    name = firefox-close-float  
    match:class = ^(firefox)$  
    match:title = ^(Close Firefox)$  
    float = true  
}  
  
windowrule {  
    name = firefox-messenger-call-float  
    match:class = ^(firefox)$  
    match:title = ^(Messenger call(.*))$  
    float = true  
}  
  
windowrule {  
    name = firefox-save-image-size  
    match:class = ^(firefox)$  
    match:title = ^(Save Image)$  
    size = 715 375  
}  
  
windowrule {  
    name = firefox-file-upload-size  
    match:class = ^(firefox)$  
    match:title = ^(File Upload)$  
    size = 595 395  
}  
  
windowrule {  
    name = firefox-close-size  
    match:class = ^(firefox)$  
    match:title = ^(Close Firefox)$  
    size = 500 290  
}  
  
# vscode  
windowrule {  
    name = vscode-save-as-float  
    match:class = ^(code)$  
    match:title = ^(Save As)$  
    float = true  
}  
  
windowrule {  
    name = vscode-open-file-float  
    match:class = ^(code)$  
    match:title = ^(Open File)$  
    float = true  
}  
  
windowrule {  
    name = vscode-open-folder-float  
    match:class = ^(code)$  
    match:title = ^(Open Folder)$  
    float = true  
}  
  
windowrule {  
    name = vscode-save-as-size  
    match:class = ^(code)$  
    match:title = ^(Save As)$  
    size = 715 375  
}  
  
windowrule {  
    name = vscode-open-file-size  
    match:class = ^(code)$  
    match:title = ^(Open File)$  
    size = 595 395  
}  
  
windowrule {  
    name = vscode-open-folder-size  
    match:class = ^(code)$  
    match:title = ^(Open Folder)$  
    size = 595 395  
}  
  
# pcmanfm-qt  
windowrule {  
    name = pcmanfm-qt-float  
    match:class = ^(pcmanfm-qt)$  
    float = true  
}  
  
windowrule {  
    name = lxqt-archiver-float  
    match:class = ^(lxqt-archiver)$  
    float = true  
}  
  
windowrule {  
    name = file-roller-float  
    match:class = ^(org.gnome.FileRoller)$  
    float = true  
}  
  
windowrule {  
    name = pcmanfm-file-properties-size  
    match:class = ^(pcmanfm-qt)$  
    match:title = ^(File Properties)$  
    size = 590 390  
}  
  
windowrule {  
    name = pcmanfm-preferences-size  
    match:class = ^(pcmanfm-qt)$  
    match:title = ^(Preferences)$  
    size = 590 390  
}  
  
# qview  
windowrule {  
    name = qview-maximize  
    match:class = ^(com.interversehq.qView)$  
    maximize = true  
}  
  
# obs-studio  
windowrule {  
    name = obs-filters-float  
    match:class = ^(com.obsproject.Studio)$  
    match:title = ^(Filters for(.*))$  
    float = true  
}  
  
windowrule {  
    name = obs-settings-size  
    match:class = ^(com.obsproject.Studio)$  
    match:title = ^(Settings)$  
    size = 810 520  
}  
  
windowrule {  
    name = obs-remux-size  
    match:class = ^(com.obsproject.Studio)$  
    match:title = ^(Remux Recordings)$  
    size = 595 395  
}  
  
# vencord/vesktop  
windowrule {  
    name = vencord-quickcss-float  
    match:class = ^(vesktop)$  
    match:title = ^(Vencord QuickCSS Editor)$  
    float = true  
}  
  
windowrule {  
    name = vencord-quickcss-size  
    match:class = ^(vesktop)$  
    match:title = ^(Vencord QuickCSS Editor)$  
    size = 595 395  
}  
  
# timeshift  
windowrule {  
    name = timeshift-float  
    match:class = ^(Timeshift-gtk)$  
    float = true  
}  
  
windowrule {  
    name = kitty-browse-center  
    match:class = ^(kitty)$  
    match:title = ^(zsh)$  
    center = true  
}

# onlyoffice
windowrule {
    name = onlyoffice-no-blur
    match:class = ^(ONLYOFFICE Desktop Editors)$
    no_blur = 1
    border_size = 0
} 

# hyprland
windowrule {  
    name = hyprland-share-picker  
    match:class = ^(hyprland-share-picker)$  
    float = true  
    size = 500 290  
}

# layer rules
layerrule {  
    name = rofi-ignorezero  
    match:namespace = rofi  
}

